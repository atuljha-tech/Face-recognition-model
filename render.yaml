services:
  - type: web
    name: face-recognition-api
    runtime: python
    buildCommand: ./render-build.sh
    startCommand: ./venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
    plan: free
